<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="sparkleGrad" x1="30" y1="4" x2="42" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="12" fill="url(#logoGrad)"/>
  <!-- Envelope body -->
  <rect x="8" y="16" width="26" height="18" rx="3" fill="white" opacity="0.95"/>
  <!-- Envelope flap -->
  <path d="M8 19 L21 28 L34 19" fill="none" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AI Sparkle - 4-pointed star -->
  <path d="M38 8 L39.5 13 L44 14.5 L39.5 16 L38 21 L36.5 16 L32 14.5 L36.5 13 Z" fill="url(#sparkleGrad)"/>
  <!-- Small sparkle -->
  <path d="M30 6 L30.8 8.5 L33 9.2 L30.8 10 L30 12.5 L29.2 10 L27 9.2 L29.2 8.5 Z" fill="white" opacity="0.8"/>
  <!-- Tiny sparkle dot -->
  <circle cx="42" cy="22" r="1.5" fill="white" opacity="0.6"/>
</svg>